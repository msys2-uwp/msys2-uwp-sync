name: Mirror poll

# Block 2: loop config, compare GitHub tips, dispatch Block 3 mirror-sync.
# Uses Actions workflow_dispatch API on mirror-sync.yml (ref msys2-apiss-mirror-sync).
# Log label: workflow_dispatch_mirror_sync (Block 3 trigger; not mirror_merge).

on:
  push:
    branches:
      - main
  schedule:
    # PollIntervalMinutes in config/mirror-poll.json (60); ~hourly, not sub-hour.
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: mirror-poll
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            config
            src

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '26'
          package-manager-cache: false

      - name: Run mirror poll
        env:
          # Same PAT as package mirror repos; see docs/usage.md (SYNC_DISPATCH_TOKEN).
          GH_TOKEN: ${{ secrets.SYNC_DISPATCH_TOKEN || github.token }}
        run: node src/mirror-poll/cli.ts
