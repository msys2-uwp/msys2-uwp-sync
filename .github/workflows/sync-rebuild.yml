name: Sync rebuild

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type rebuild to reset and replay upstream history'
        required: true
        type: string

concurrency:
  group: sync-rebuild
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebuild:
    if: inputs.confirm == 'rebuild'
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: Checkout sync repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global i18n.logOutputEncoding utf-8
          git config --global i18n.commitEncoding utf-8

      - name: Clone destination repository
        env:
          MSYS2_UWP_SYNC_TOKEN: ${{ secrets.MSYS2_UWP_SYNC_TOKEN }}
        run: |
          mkdir -p .work/destination
          git clone "https://x-access-token:${MSYS2_UWP_SYNC_TOKEN}@github.com/msys2-uwp/msys2-uwp.git" .work/destination/msys2-uwp

      - name: Install dependencies
        run: npm ci

      - name: Run rebuild
        run: |
          npm run sync -- --clean --destination-path .work/destination/msys2-uwp
