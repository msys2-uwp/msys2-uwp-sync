name: Sync rebuild

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type rebuild to reset and replay upstream history'
        required: true
        type: string

concurrency:
  group: sync-rebuild
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebuild:
    if: inputs.confirm == 'rebuild'
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: Checkout sync repo
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '26'
          cache: yarn

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global i18n.logOutputEncoding utf-8
          git config --global i18n.commitEncoding utf-8

      - name: Clone destination repository
        env:
          MSYS2_APISS_SYNC_TOKEN: ${{ secrets.MSYS2_APISS_SYNC_TOKEN }}
        run: |
          mkdir -p .work/destination
          git clone "https://x-access-token:${MSYS2_APISS_SYNC_TOKEN}@github.com/msys2-apiss/msys2-apiss.git" .work/destination/msys2-apiss

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run rebuild
        run: |
          yarn sync --clean --destination-path .work/destination/msys2-apiss
