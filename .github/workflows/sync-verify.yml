name: Sync verify

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: sync-verify
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: Checkout sync repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global i18n.logOutputEncoding utf-8
          git config --global i18n.commitEncoding utf-8

      - name: Clone destination repository
        run: |
          mkdir -p .work/destination
          git clone "https://github.com/msys2-uwp/msys2-uwp.git" .work/destination/msys2-uwp

      - name: Install dependencies
        run: npm ci

      - name: Run verify
        id: verify
        continue-on-error: true
        run: |
          npm run sync -- --dry-run --skip-fetch --destination-path .work/destination/msys2-uwp

      - name: Open issue on mismatch
        if: steps.verify.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Upstream replay manifest mismatch" \
            --body "Weekly verify failed on $(date -u +%Y-%m-%d). Check sync logs and docs/PLAN.md recovery steps."
