name: Sync verify

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: sync-verify
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: Checkout sync repo
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '26'
          cache: yarn

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global i18n.logOutputEncoding utf-8
          git config --global i18n.commitEncoding utf-8

      - name: Clone destination repository
        run: |
          mkdir -p .work/destination
          git clone "https://github.com/msys2-apiss/msys2-apiss.git" .work/destination/msys2-apiss

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run verify
        id: verify
        continue-on-error: true
        run: |
          yarn sync --dry-run --skip-fetch --destination-path .work/destination/msys2-apiss

      - name: Open issue on mismatch
        if: steps.verify.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Upstream replay manifest mismatch" \
            --body "Weekly verify failed on $(date -u +%Y-%m-%d). Check sync logs and docs/PLAN.md recovery steps."
