name: Sync verify

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

concurrency:
  group: sync-verify
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: Checkout sync repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup PowerShell
        uses: actions/setup-powershell@v5
        with:
          pwsh-version: '7.4'

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone destination repository
        run: |
          mkdir -p .work/destination
          git clone "https://github.com/msys2-uwp/msys2-uwp.git" .work/destination/msys2-uwp

      - name: Run verify
        id: verify
        shell: pwsh
        continue-on-error: true
        run: |
          ./scripts/Sync-Verify.ps1 -DestinationPath .work/destination/msys2-uwp

      - name: Open issue on mismatch
        if: steps.verify.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Upstream replay manifest mismatch" \
            --body "Weekly verify failed on $(date -u +%Y-%m-%d). Check sync logs and docs/PLAN.md recovery steps."
