name: Sync upstream

on:
  repository_dispatch:
    types:
      - upstream-updated
      - msys2-packages-updated
      - mingw-packages-updated
  schedule:
    - cron: '0 * * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      clean:
        description: 'Reset sync branches before replay'
        required: false
        default: false
        type: boolean

concurrency:
  group: sync-upstream
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "dispatch_type=${{ github.event.action }}"
          echo "client_payload=${{ toJson(github.event.client_payload) }}"

      - name: Checkout sync repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global i18n.logOutputEncoding utf-8
          git config --global i18n.commitEncoding utf-8

      - name: Clone destination repository
        env:
          MSYS2_UWP_SYNC_TOKEN: ${{ secrets.MSYS2_UWP_SYNC_TOKEN }}
        run: |
          mkdir -p .work/destination
          git clone "https://x-access-token:${MSYS2_UWP_SYNC_TOKEN}@github.com/msys2-uwp/msys2-uwp.git" .work/destination/msys2-uwp

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: |
          args=(--destination-path .work/destination/msys2-uwp)
          if [ "${{ inputs.clean }}" = "true" ]; then
            args+=(--clean)
          fi
          npm run sync -- "${args[@]}"
