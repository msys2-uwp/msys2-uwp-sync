name: Sync upstream

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup PowerShell
        uses: actions/setup-powershell@v5
        with:
          pwsh-version: '7.4'

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Clone destination repository
        env:
          MSYS2_UWP_SYNC_TOKEN: ${{ secrets.MSYS2_UWP_SYNC_TOKEN }}
        run: |
          mkdir -p .work/destination
          git clone "https://x-access-token:${MSYS2_UWP_SYNC_TOKEN}@github.com/msys2-uwp/msys2-uwp.git" .work/destination/msys2-uwp

      - name: Run incremental sync
        shell: pwsh
        run: |
          ./scripts/Sync-Incremental.ps1 `
            -DestinationPath .work/destination/msys2-uwp `
            -PushDestination

      - name: Commit sync state
        if: success()
        run: |
          git add .sync/state.json .sync/replay-manifest.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "Update sync state after upstream replay."
            git push origin main
          fi
