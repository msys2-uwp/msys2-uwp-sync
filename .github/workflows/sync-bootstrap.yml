name: Sync bootstrap

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type bootstrap to run full history replay'
        required: true
        type: string
      max_commits:
        description: 'Limit commits (0 = unlimited)'
        required: false
        default: '0'

concurrency:
  group: sync-bootstrap
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bootstrap:
    if: inputs.confirm == 'bootstrap'
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: Checkout sync repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.18.0'
          cache: npm

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global i18n.logOutputEncoding utf-8
          git config --global i18n.commitEncoding utf-8

      - name: Clone destination repository
        env:
          MSYS2_UWP_SYNC_TOKEN: ${{ secrets.MSYS2_UWP_SYNC_TOKEN }}
        run: |
          mkdir -p .work/destination
          git clone "https://x-access-token:${MSYS2_UWP_SYNC_TOKEN}@github.com/msys2-uwp/msys2-uwp.git" .work/destination/msys2-uwp

      - name: Install dependencies
        run: npm ci

      - name: Run bootstrap
        run: |
          args=(--clean --destination-path .work/destination/msys2-uwp)
          if [ "${{ inputs.max_commits }}" != "0" ]; then
            args+=(--max-commits "${{ inputs.max_commits }}")
          fi
          npm run sync -- "${args[@]}"
