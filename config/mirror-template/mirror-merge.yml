name: Mirror merge

# Install on destination repo branch msys2-apiss-mirror-merge (workflows live here, not on upstream*).
# Copy this file to: msys2-apiss-mirror-merge/.github/workflows/mirror-merge.yml
#   (from config/mirror-template/mirror-merge.yml in msys2-apiss-sync; applied by yarn mirror-init)
#
# Replay branches (upstream, upstream-ports, upstream-ports-mingw) stay workflow-free.
# TypeScript and config/sync.json live in msys2-apiss/msys2-apiss-sync (main); checkout below.
#
# Triggers (do not confuse the two dispatch names):
#   Block 3 -> Block 4: repository_dispatch event-type workflow_dispatch_mirror_merge
#     (mirror-sync Notify step; package mirrors with Notify.Enabled).
#   Block 2 -> Block 3: Actions workflow_dispatch API on mirror-sync.yml
#     (ref msys2-apiss-mirror-sync; log label workflow_dispatch_mirror_sync).
#   Manual: workflow_dispatch below (inputs.clean).

on:
  repository_dispatch:
    types:
      - workflow_dispatch_mirror_merge
  workflow_dispatch:
    inputs:
      clean:
        description: 'Reset sync branches before replay'
        required: false
        default: false
        type: boolean

concurrency:
  group: mirror-merge
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Log trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"

      - name: Checkout destination repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          path: destination

      - name: Checkout tooling repo
        uses: actions/checkout@v5
        with:
          repository: msys2-apiss/msys2-apiss-sync
          ref: main
          path: tooling
          token: ${{ github.token }}

      - name: Enable Corepack
        working-directory: tooling
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '26'
          cache: yarn
          cache-dependency-path: tooling/yarn.lock

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global i18n.logOutputEncoding utf-8
          git config --global i18n.commitEncoding utf-8

      - name: Install dependencies
        working-directory: tooling
        run: yarn install --frozen-lockfile

      - name: Run mirror merge
        working-directory: tooling
        run: |
          args=(--destination-path "$GITHUB_WORKSPACE/destination" --push)
          if [ "${{ inputs.clean }}" = "true" ]; then
            args+=(--clean)
          fi
          yarn mirror-merge "${args[@]}"
