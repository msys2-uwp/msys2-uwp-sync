name: Mirror merge

# Install on destination repo branch msys2-apiss-mirror-merge (workflows live here, not on upstream*).
# Layout: docs/mirror-init.md#tooling-branch-layout
# Copy this file to: msys2-apiss-mirror-merge/.github/workflows/mirror-merge.yml
#   (from config/mirror-template/mirror-merge.yml in msys2-apiss-sync; applied by yarn mirror-init)
#
# Replay branches (upstream, upstream-ports, upstream-ports-mingw) stay workflow-free.
# Block 4 CLI bundle: .github/toolings/ (installed by yarn mirror-init on this branch).
#
# Triggers (Block 2 -> Block 3 and Block 3 -> Block 4 both use workflow_dispatch API):
#   Block 3 -> Block 4: gh workflow run mirror-merge.yml on ref msys2-apiss-mirror-merge
#     with inputs.event_type=workflow_dispatch_mirror_merge (mirror-sync Notify step).
#   Block 2 -> Block 3: gh workflow run mirror-sync.yml on ref msys2-apiss-mirror-sync
#     with inputs.event_type=workflow_dispatch_mirror_sync.
#   Manual: workflow_dispatch below (inputs.clean).

on:
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Block 3 dispatch label'
        required: false
        default: workflow_dispatch_mirror_merge
        type: string
      clean:
        description: 'Reset sync branches before replay'
        required: false
        default: false
        type: boolean

concurrency:
  group: mirror-merge
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Log trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "event_type=${{ inputs.event_type }}"
          echo "repository=${{ github.repository }}"
          echo "ref=${{ github.ref }}"

      - name: Checkout destination repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '26'

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global i18n.logOutputEncoding utf-8
          git config --global i18n.commitEncoding utf-8

      - name: Run mirror merge
        run: |
          set -euo pipefail
          CLI=".github/toolings/src/mirror-merge/cli.ts"
          if [ ! -f "${CLI}" ]; then
            echo "Missing ${CLI}; run yarn mirror-init on the tooling repo"
            exit 1
          fi
          args=(--destination-path "$GITHUB_WORKSPACE" --push)
          if [ "${{ inputs.clean }}" = "true" ]; then
            args+=(--clean)
          fi
          node "${CLI}" "${args[@]}"
