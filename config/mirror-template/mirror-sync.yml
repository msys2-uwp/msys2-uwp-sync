name: Mirror sync from upstream

# Install on mirror repo branch msys2-apiss-mirror-sync (workflows live here, not on master).
# Copy this file to: .github/workflows/mirror-sync.yml on that branch
# Copy a per-repo config to: .github/mirror-sync.json
#   (from config/mirror-sync/<repo-name>.json in msys2-apiss-sync; applied by yarn mirror-init)
#
# master (or configured mirror branches) holds upstream history only;
# do not commit workflows to mirrored branches.
#
# Block 3 CLI bundle: .github/toolings/ (installed by yarn mirror-init on this branch).
#
# Triggers (do not confuse the two dispatch names):
#   Block 2 -> Block 3: Actions workflow_dispatch API on ref msys2-apiss-mirror-sync
#     with inputs.event_type=workflow_dispatch_mirror_sync (yarn mirror-poll / mirror-poll.yml).
#   Block 3 -> Block 4: repository_dispatch event-type workflow_dispatch_mirror_merge
#     (Notify downstream step below; package mirrors only).

on:
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Block 2 dispatch label (not Block 4 repository_dispatch event-type)'
        required: false
        default: workflow_dispatch_mirror_sync
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Log trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "event_type=${{ inputs.event_type }}"

      - name: Checkout mirror repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Optional PAT with contents:write on this mirror; falls back to github.token.
          token: ${{ secrets.SYNC_DISPATCH_TOKEN || github.token }}

      - name: Read push transport
        id: push
        run: |
          set -euo pipefail
          CONFIG=".github/mirror-sync.json"
          if [ ! -f "${CONFIG}" ]; then
            echo "Missing ${CONFIG} on msys2-apiss-mirror-sync branch"
            exit 1
          fi
          PUSH_VIA_SSH="$(jq -r '.PushViaSsh // false' "${CONFIG}")"
          echo "via_ssh=${PUSH_VIA_SSH}" >> "$GITHUB_OUTPUT"

      - name: Configure SSH push
        if: steps.push.outputs.via_ssh == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MIRROR_PUSH_SSH_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '26'

      - name: Run mirror sync
        id: sync
        run: |
          set -euo pipefail
          CLI=".github/toolings/src/mirror-sync/cli.ts"
          if [ ! -f "${CLI}" ]; then
            echo "Missing ${CLI}; run yarn mirror-init on the tooling repo"
            exit 1
          fi
          node "${CLI}" \
            --repo-path "$GITHUB_WORKSPACE" \
            --event-type "${{ inputs.event_type }}"

      - name: Notify downstream
        if: steps.sync.outputs.dispatch_mirror_merge == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          # Block 4: repository_dispatch event-type workflow_dispatch_mirror_merge
          # (Block 2 uses Actions workflow_dispatch API to this workflow, not this event).
          token: ${{ secrets.SYNC_DISPATCH_TOKEN }}
          repository: ${{ steps.sync.outputs.notify_repository }}
          event-type: ${{ steps.sync.outputs.notify_event_type }}
          client-payload: >-
            {
              "source": "${{ github.repository }}",
              "sha": "${{ steps.sync.outputs.sha }}",
              "ref": "${{ steps.sync.outputs.ref }}"
            }
